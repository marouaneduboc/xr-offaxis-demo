<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XR Off-Axis Projection Demo</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="canvas-wrap">
        <canvas id="scene-canvas" aria-label="3D off-axis projection scene"></canvas>
      </section>

      <aside id="ui-overlay">
        <h1>XR Off-Axis Projection Demo</h1>
        <p class="instructions">
          Drag the character to move it. Toggle rotate mode to spin it with drag.
          Enable face tracking for webcam-driven off-axis projection.
        </p>

        <div class="controls">
          <button id="toggle-tracking-btn" type="button">Enable Face Tracking</button>
          <button id="toggle-rotate-btn" type="button">Rotate Mode: Off</button>
          <button id="reset-view-btn" type="button">Reset View</button>
        </div>

        <div class="model-loader">
          <label for="glb-upload">Load your GLB</label>
          <input id="glb-upload" type="file" accept=".glb,model/gltf-binary" />
        </div>

        <div class="sliders">
          <label>
            Manual X
            <input id="manual-x" type="range" min="-1" max="1" step="0.01" value="0" />
          </label>
          <label>
            Manual Y
            <input id="manual-y" type="range" min="-1" max="1" step="0.01" value="0" />
          </label>
          <label>
            Manual Z
            <input id="manual-z" type="range" min="-1" max="1" step="0.01" value="0" />
          </label>
        </div>

        <p id="status-text" role="status">
          Face tracking is off. Using manual controls.
        </p>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
