<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XR Gaussian Viewer</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="canvas-wrap">
        <canvas id="scene-canvas" aria-label="3D off-axis projection scene"></canvas>
        <iframe id="splat-viewer-frame" title="Gaussian splat viewer" loading="eager"></iframe>
        <div id="viewer-drag-surface" aria-hidden="true"></div>
      </section>
      <button id="menu-toggle-btn" type="button" aria-expanded="true">Hide Menu</button>

      <aside id="ui-overlay">
        <h1>XR Gaussian Viewer</h1>

        <div class="controls">
          <button id="toggle-tracking-btn" type="button">Enable Face Tracking</button>
          <button id="reset-view-btn" type="button">Reset View</button>
          <button id="recenter-portal-btn" type="button">Recenter Portal</button>
        </div>

        <div class="model-loader">
          <label for="splat-upload">Load Gaussian Splat / PLY</label>
          <input id="splat-upload" type="file" accept=".ply,.compressed.ply,.sog,.splat,.ksplat,.spz" />
          <label for="splat-scale">Zoom</label>
          <input id="splat-scale" type="range" min="0.01" max="8" step="0.01" value="1" />
          <label for="parallax-strength">Parallax</label>
          <input id="parallax-strength" type="range" min="0" max="2.5" step="0.05" value="1" />
        </div>

        <div class="calibration-panel">
          <p class="calibration-title">Screen Calibration</p>
          <div class="calibration-grid">
            <label>
              Width (cm)
              <input id="screen-width-input" type="number" min="10" max="200" step="0.1" value="34" />
            </label>
            <label>
              Height (cm)
              <input id="screen-height-input" type="number" min="10" max="200" step="0.1" value="19" />
            </label>
            <label>
              Distance (cm)
              <input id="view-distance-input" type="number" min="20" max="200" step="0.1" value="60" />
            </label>
          </div>
          <button id="save-calibration-btn" type="button">Save Calibration</button>
        </div>

        <div class="look-controls">
          <p class="look-title">Camera Pan</p>
          <div class="look-grid">
            <button type="button" class="look-btn look-up" data-look="up" aria-label="Pan Up">&#9650;</button>
            <button type="button" class="look-btn look-left" data-look="left" aria-label="Pan Left">&#9664;</button>
            <button type="button" class="look-btn look-right" data-look="right" aria-label="Pan Right">&#9654;</button>
            <button type="button" class="look-btn look-down" data-look="down" aria-label="Pan Down">&#9660;</button>
          </div>
        </div>

        <p id="status-text" role="status">
          Face tracking is off. Portal is stable.
        </p>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
